  cloud_firestore: ^5.6.3
  firebase_auth: ^5.3.2
  firebase_messaging: ^15.1.3

  # UI
  go_router: ^14.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

